name: Fingerprints - Mark as released
on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: fingerprint-released-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync:
    # Fork note: upstream ClickHouse + self-hosted runner — upstream only.
    if: github.repository == 'Nexus-Mods/Vortex'
    runs-on: platform-cluster
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/fingerprints
        with:
          mode: release
          clickhouse-url: ${{ secrets.CLICKHOUSE_URL }}
          clickhouse-user: ${{ secrets.CLICKHOUSE_USER }}
          clickhouse-password: ${{ secrets.CLICKHOUSE_PASSWORD }}
